title: "FMPL — durable TupleSpace (ITER-TUPLE-PERSIST)"

description: |
  Two `fmpl-cli` REPL processes, sequenced through the same on-disk
  fjall-backed TupleSpace. Alice opens the space, `out`s durable
  tuples, exits. Bob — a fresh process spawned after Alice exits —
  opens the same path, `rd`s the same tuples back. Byte-identical
  recovery across the process boundary.

  This closes the seam that the `three_hashes.yaml` demo named: the
  coordination primitive itself is now persistent. Same fjall
  single-writer constraint as the SourceStore demo — Alice and Bob
  sequence, not overlap.

  Per the ITER-TUPLE-PERSIST scope doc:
  `docs/superpowers/specs/2026-05-15-iter-tuple-persist.md`

defaults:
  sleep_after: 0.7

actions:
  - type: comment
    title: "Reading guide"
    body: |
      The shape is the same as `three_hashes.yaml`:
        - Alice opens a tuplespace, writes a few tuples, exits.
        - Bob opens the same path, reads them back.
        - The harness asserts what Bob recovered equals what Alice
          stored.

      The new piece is the `durable: true` flag on each `out`. Tuples
      without it stay in memory and don't survive Alice's exit. The
      demo proves both: durable tuples come back; non-durable ones
      don't.

  - type: banner
    title: "Setup — Alice opens a durable tuplespace"

  - type: spawn
    name: alice

  - type: repl_eval
    in: alice
    expr: 'let world = tuplespace.open("{{ tmpdir }}/tuplespace")'

  - type: banner
    title: "Alice writes — two durable tuples, one ephemeral"

  - type: show_source
    snippet: |
      world.out(%{type: :room, data: %{name: "Rusty Flagon"}, durable: true})
      world.out(%{type: :menu, data: %{ale: 3, mead: 5}, durable: true})
      world.out(%{type: :note, data: "scratch — should NOT survive"})
    caption: "Alice's three out() calls"

  - type: narrate
    text: >-
      Two durable tuples (`:room`, `:menu`) and one ephemeral note. The
      `durable: true` flag opts each tuple into write-through to the
      backing fjall keyspace; without it, the tuple lives only in
      memory.

  - type: repl_eval
    in: alice
    expr: 'world.out(%{type: :room, data: %{name: "Rusty Flagon"}, durable: true})'

  - type: repl_eval
    in: alice
    expr: 'world.out(%{type: :menu, data: %{ale: 3, mead: 5}, durable: true})'

  - type: repl_eval
    in: alice
    expr: 'world.out(%{type: :note, data: "scratch — should NOT survive"})'

  - type: section
    title: "Alice confirms in-memory state before exit"
  - type: narrate
    text: >-
      All three tuples are visible in Alice's session — the durable
      flag affects what hits disk, not what's queryable in memory.
  - type: repl_eval
    in: alice
    expr: 'world.rd(:room).data.name'
    capture_result_as: alice_room_name
  - type: repl_eval
    in: alice
    expr: 'world.rd(:menu).data.ale'
    capture_result_as: alice_ale_price
  - type: repl_eval
    in: alice
    expr: 'world.rd(:note).data'
    capture_result_as: alice_note

  - type: banner
    title: "Alice exits — fjall flushes, lock releases"
  - type: narrate
    text: >-
      Closing Alice's process drops the TupleSpace value, which drops
      the FjallStore, which closes the keyspace cleanly. Bob (or
      anyone) can now open the same path.
  - type: close_session
    name: alice

  - type: banner
    title: "Bob — fresh process, reopen the same path"

  - type: spawn
    name: bob

  - type: repl_eval
    in: bob
    expr: 'let world = tuplespace.open("{{ tmpdir }}/tuplespace")'

  - type: section
    title: "Bob recovers the durable tuples"
  - type: narrate
    text: >-
      `tuplespace.open` replays every `PayloadKind::Tuple` record from
      the keyspace into the in-memory BTreeMap, in FIFO order
      (big-endian seq encoding + fjall byte-ordered iter). Bob's `rd`
      goes through the same in-memory query path as always — the
      durable layer is write-through, not read-through.

  - type: repl_eval
    in: bob
    expr: 'world.rd(:room).data.name'
    capture_result_as: bob_room_name

  - type: repl_eval
    in: bob
    expr: 'world.rd(:menu).data.ale'
    capture_result_as: bob_ale_price

  - type: section
    title: "Ephemeral tuple did NOT survive"
  - type: narrate
    text: >-
      The `:note` tuple was out'd without `durable: true`, so it lived
      only in Alice's in-memory BTreeMap. Bob's process has no
      knowledge of it — `rdp` errors with "no matching tuple found".
  - type: repl_eval
    in: bob
    expr: 'world.rdp(:note)'
    expect_error: true
    sleep_after: 1.2

  - type: banner
    title: "Audit — Bob's recovered values equal Alice's stored values"
  - type: narrate
    text: >-
      Different processes, sequenced through one on-disk fjall
      keyspace, byte-identical recovery for the durable tuples,
      principled absence for the ephemeral one.
  - type: assert_equal
    label: "room name round-trips"
    lhs: "{{ bob_room_name }}"
    rhs: "{{ alice_room_name }}"
  - type: assert_equal
    label: "menu.ale price round-trips"
    lhs: "{{ bob_ale_price }}"
    rhs: "{{ alice_ale_price }}"

  - type: comment
    title: "Wrap"
    body: |
      ITER-TUPLE-PERSIST lands: the TupleSpace, FMPL's coordination primitive,
      is now disk-backed via the same `Store` trait that backs the
      SourceStore demo (`three_hashes.yaml`) and fmpl-web's
      continuations + image stores.

      The design invariant from `specs/tuplespace.md:111-115` —
      `durable: true` opt-in per tuple — is now real, not aspirational.
      Spec/impl gap closed.

      What's deferred (in scope doc):
        - persistent subscriptions
        - pattern-match via storage (queries still go through memory)
        - GC for orphaned tuples after partial-failure
        - cross-process simultaneous access (fjall single-writer)

  - type: close_session
    name: bob
